<h1>Reynolds Number Calculator</h1>

<p>
Calculate Reynolds number to determine whether
flow is laminar or turbulent. Widely used in
fluid mechanics and piping engineering.
</p>

<h2>Formula</h2>

<p>
Re = ρ v D / μ
</p>

<h3>Flow regimes</h3>

<ul>
<li>Re &lt; 2000 → Laminar</li>
<li>2000 – 4000 → Transitional</li>
<li>Re &gt; 4000 → Turbulent</li>
</ul>
