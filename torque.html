<h1>Torque Calculator</h1>

<p>
Calculate torque generated by a force acting
at a distance from the rotation axis. This
tool is used in mechanical engineering and
machine design.
</p>

<h2>Formula</h2>

<p>
Torque = Force × Radius
</p>

<h2>Example</h2>

<p>
If force = 100 N and radius = 0.5 m,
torque = 50 N·m.
</p>
